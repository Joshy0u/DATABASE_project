#copied from backendyml file.
name: Frontend Docker CI 

on:
  push:
    paths:
      - "frontend/**"
  pull_request:
    paths:
      - "frontend/**"

# changing from code verification to docker build verification
# now changing from no tagging, to github tagging for tracability
jobs: 
  build-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag via GIT SHA
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: LOGIN DOCKERHUB
        run: |
          echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.NAME }}" --password-stdin
      
      - name: Build frontend Docker image (Frontend+SHA)
        run: |
          docker build \
          -t ${{ secrets.NAME }}/databaseproject:frontend-${IMAGE_TAG} \
          ./frontend

      - name: Verify image exists
        run: |
          docker images | grep frontend
      
      - name: Push to DOCKER HUB 
        run: |
          docker push ${{ secrets.NAME }}/databaseproject:frontend-${IMAGE_TAG}
      
      - name: Checkout Infrastructure repo 
        uses: actions/checkout@v4 
        with:
          repository: Joshy0u/k8s-infrastructure
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: infra-repo 

      - name: Update Image Tag in Infrastructure repo
        run: |
          cd infra-repo 
          #find, and update step below:
          sed -i "s|image: ${{ secrets.NAME }}/databaseproject:frontend-.*|image: ${{ secrets.NAME }}/databaseproject:frontend-${IMAGE_TAG}|g" manifests/frontend/deployment.yaml

          git config --global user.name "GitOps Bot" 
          git config --global user.email "gitops-bot@users.noreply.github.com"

          #commit and push
          git add manifests/frontend/deployment.yaml
          git commit -m "chore: update backend image to frontend-${IMAGE_TAG}"
          git push origin main
